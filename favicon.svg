<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff3b0"/>
      <stop offset="35%" stop-color="#ffcc33"/>
      <stop offset="70%" stop-color="#ff7a00"/>
      <stop offset="100%" stop-color="#e02200"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="50"
        fill="url(#fire)" filter="url(#glow)" stroke="#ff5500" stroke-width="0.6">S</text>
</svg>
